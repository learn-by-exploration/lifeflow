<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shared List – LifeFlow</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#1a1a2e;min-height:100vh;display:flex;flex-direction:column}
.wrap{max-width:520px;margin:0 auto;width:100%;padding:16px}
.head{text-align:center;padding:24px 0 16px}
.head h1{font-size:20px;margin:4px 0 2px}
.head .type{font-size:12px;color:#666;margin-bottom:4px}
.head .icon{font-size:36px;display:block;margin-bottom:4px}
.items{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #eee;transition:background .15s}
.item:last-child{border-bottom:none}
.item.checked{opacity:.5}
.item.checked .title{text-decoration:line-through}
.chk{background:none;border:none;cursor:pointer;color:#888;font-size:0;padding:0}
.chk span{font-size:22px}
.chk.done span{color:#33B679}
.title{flex:1;font-size:14px}
.qty{font-size:11px;background:#e8f0fe;color:#1967d2;padding:2px 8px;border-radius:10px}
.cat-hdr{padding:8px 16px;font-size:11px;font-weight:600;color:#666;background:#f9f9f9;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #eee}
.note-content{font-size:12px;color:#555;padding:4px 0 0;line-height:1.4}
.add-bar{display:flex;gap:8px;margin-top:12px}
.add-bar input{flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
.add-bar input:focus{border-color:#2563EB}
.add-bar button{padding:10px 18px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px}
.add-bar button:hover{background:#1d4ed8}
.empty{text-align:center;padding:40px 20px;color:#999}
.empty span{font-size:48px;opacity:.3;display:block;margin-bottom:8px}
.footer{text-align:center;padding:24px 0;font-size:11px;color:#999;margin-top:auto}
.footer a{color:#2563EB;text-decoration:none}
.err{text-align:center;padding:60px 20px}
.err h2{font-size:18px;margin-bottom:8px}
.err p{color:#666;font-size:13px}
.count{font-size:11px;color:#999;text-align:right;padding:8px 16px}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div style="text-align:center;padding:60px 0;color:#999">Loading...</div>
</div>
<div class="footer">Powered by <a href="/">LifeFlow</a></div>
<script src="js/share.js"></script>
</body>
</html>
