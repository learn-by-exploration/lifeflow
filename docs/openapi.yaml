openapi: 3.0.3
info:
  title: LifeFlow API
  description: |
    Personal productivity API for task management, goal tracking, habits,
    focus sessions, lists, notes, and more.

    ## Error Responses
    All error responses use a consistent shape:
    ```json
    { "error": "Human-readable error message" }
    ```

    ## Common Status Codes
    | Code | Meaning |
    |------|---------|
    | 200  | Success |
    | 201  | Created (POST that creates a resource) |
    | 400  | Bad request (validation error) |
    | 404  | Resource not found |
    | 409  | Conflict (constraint violation) |
    | 500  | Internal server error |
  version: 0.7.52
  license:
    name: MIT

servers:
  - url: http://localhost:3456
    description: Local development

tags:
  - name: Tasks
    description: Task CRUD, search, calendar, board, reorder, bulk operations
  - name: Subtasks
    description: Subtask management within tasks
  - name: Dependencies
    description: Task dependency management
  - name: Comments
    description: Task comments
  - name: Areas
    description: Life area management
  - name: Goals
    description: Goal management within areas
  - name: Milestones
    description: Goal milestones
  - name: Tags
    description: Tag management and task tagging
  - name: Lists
    description: Lists, list items, sharing, templates
  - name: Habits
    description: Habit tracking and logging
  - name: Focus
    description: Focus/pomodoro sessions
  - name: Stats
    description: Dashboard stats, streaks, trends, activity
  - name: Notes
    description: Personal notes
  - name: Inbox
    description: Quick-capture inbox and triage
  - name: Reviews
    description: Weekly reviews
  - name: Filters
    description: Saved and smart filters
  - name: Templates
    description: Task templates
  - name: Rules
    description: Automation rules
  - name: Planner
    description: Daily planner and smart suggestions
  - name: Settings
    description: Application settings
  - name: Data
    description: Backup, export, import, iCal, search
  - name: Push Notifications
    description: Web Push subscribe, unsubscribe, test, VAPID keys
  - name: Health
    description: Health check endpoint

paths:
  # ─── Tasks ───
  /api/goals/{goalId}/tasks:
    get:
      tags: [Tasks]
      summary: List tasks for a goal
      parameters:
        - name: goalId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Array of enriched tasks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Task' }
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags: [Tasks]
      summary: Create a task in a goal
      parameters:
        - name: goalId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                note: { type: string }
                priority: { type: integer, minimum: 0, maximum: 3 }
                due_date: { type: string, format: date }
                due_time: { type: string }
                recurring: { type: string }
                assigned_to: { type: string }
                my_day: { type: integer, enum: [0, 1] }
                tagIds: { type: array, items: { type: integer } }
                time_block_start: { type: string }
                time_block_end: { type: string }
                estimated_minutes: { type: number, minimum: 0 }
                list_id: { type: integer }
      responses:
        '201':
          description: Created task
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Task' }
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/tasks/my-day:
    get:
      tags: [Tasks]
      summary: Get My Day tasks (flagged or due today)
      responses:
        '200':
          description: Array of enriched tasks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Task' }

  /api/tasks/all:
    get:
      tags: [Tasks]
      summary: Get all tasks
      responses:
        '200':
          description: Array of enriched tasks ordered by status, priority, due date
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Task' }

  /api/tasks/board:
    get:
      tags: [Tasks]
      summary: Get tasks for kanban board view
      parameters:
        - name: goal_id
          in: query
          schema: { type: integer }
        - name: area_id
          in: query
          schema: { type: integer }
        - name: priority
          in: query
          schema: { type: integer }
        - name: tag_id
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Array of enriched tasks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Task' }

  /api/tasks/calendar:
    get:
      tags: [Tasks]
      summary: Get tasks within a date range
      parameters:
        - name: start
          in: query
          required: true
          schema: { type: string, format: date }
        - name: end
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          description: Array of enriched tasks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Task' }
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/tasks/overdue:
    get:
      tags: [Tasks]
      summary: Get overdue tasks
      responses:
        '200':
          description: Array of enriched overdue tasks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Task' }

  /api/tasks/recurring:
    get:
      tags: [Tasks]
      summary: Get recurring tasks
      responses:
        '200':
          description: Array of enriched recurring tasks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Task' }

  /api/tasks/suggested:
    get:
      tags: [Tasks]
      summary: Get suggested next tasks (What's Next)
      description: Returns tasks scored by priority, due date, and context for the current user.
      responses:
        '200':
          description: Array of suggested tasks with scores
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Task' }

  /api/tasks/table:
    get:
      tags: [Tasks]
      summary: Get tasks in table format
      description: Returns paginated tasks with sorting, filtering, and grouping support.
      parameters:
        - name: sort
          in: query
          schema: { type: string }
        - name: order
          in: query
          schema: { type: string, enum: [asc, desc] }
        - name: group
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Paginated table data
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items: { $ref: '#/components/schemas/Task' }
                  total: { type: integer }
                  page: { type: integer }

  /api/tasks/timeline:
    get:
      tags: [Tasks]
      summary: Get tasks for Gantt/timeline view
      description: Returns tasks with due dates, dependencies, and area/goal context for timeline rendering.
      parameters:
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Tasks with timeline data
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Task' }

  /api/tasks/batch:
    patch:
      tags: [Tasks]
      summary: Bulk update multiple tasks
      description: Apply updates (status, priority, due_date, goal_id) to multiple tasks at once.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids, updates]
              properties:
                ids:
                  type: array
                  items: { type: integer }
                updates:
                  type: object
                  properties:
                    status: { type: string, enum: [todo, doing, done] }
                    priority: { type: integer, enum: [0, 1, 2, 3] }
                    due_date: { type: string, format: date, nullable: true }
                    goal_id: { type: integer, nullable: true }
      responses:
        '200':
          description: Batch update result
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated: { type: integer }

  /api/tasks/search:
    get:
      tags: [Tasks]
      summary: Search tasks by query
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Array of matching tasks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Task' }

  /api/tasks/{id}:
    get:
      tags: [Tasks]
      summary: Get a single task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Enriched task object
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Task' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                note: { type: string }
                status: { type: string, enum: [todo, doing, done] }
                priority: { type: integer, minimum: 0, maximum: 3 }
                due_date: { type: string, format: date, nullable: true }
                due_time: { type: string, nullable: true }
                recurring: { type: string, nullable: true }
                my_day: { type: integer, enum: [0, 1] }
                goal_id: { type: integer }
                estimated_minutes: { type: number, minimum: 0, nullable: true }
                list_id: { type: integer, nullable: true }
      responses:
        '200':
          description: Updated enriched task
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Task' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Deletion confirmation
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/tasks/parse:
    post:
      tags: [Tasks]
      summary: Parse natural language into task fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string }
      responses:
        '200':
          description: Parsed task fields
          content:
            application/json:
              schema:
                type: object
                properties:
                  title: { type: string }
                  due_date: { type: string, format: date, nullable: true }
                  priority: { type: integer }
                  recurring: { type: string, nullable: true }

  /api/tasks/{id}/skip:
    post:
      tags: [Tasks]
      summary: Skip current occurrence of a recurring task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Updated task with next due date
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Task' }
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/tasks/{id}/move:
    post:
      tags: [Tasks]
      summary: Move a task to a different goal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [goal_id]
              properties:
                goal_id: { type: integer }
      responses:
        '200':
          description: Moved task
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Task' }
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/tasks/reorder:
    put:
      tags: [Tasks]
      summary: Reorder tasks within a goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids: { type: array, items: { type: integer } }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  /api/tasks/bulk:
    put:
      tags: [Tasks]
      summary: Bulk update tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids: { type: array, items: { type: integer } }
                status: { type: string }
                priority: { type: integer }
                due_date: { type: string, format: date }
                my_day: { type: integer }
                goal_id: { type: integer }
      responses:
        '200':
          description: Bulk update result
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated: { type: integer }

  /api/tasks/bulk-myday:
    post:
      tags: [Tasks]
      summary: Add/remove tasks from My Day in bulk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids, my_day]
              properties:
                ids: { type: array, items: { type: integer } }
                my_day: { type: integer, enum: [0, 1] }
      responses:
        '200':
          description: Bulk update result
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated: { type: integer }

  /api/tasks/reschedule:
    post:
      tags: [Tasks]
      summary: Reschedule overdue tasks
      responses:
        '200':
          description: Number of rescheduled tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  rescheduled: { type: integer }

  /api/tasks/{id}/time:
    post:
      tags: [Tasks]
      summary: Log time tracked on a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [minutes]
              properties:
                minutes: { type: number, minimum: 0 }
                note: { type: string }
      responses:
        '200':
          description: Time entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }

  # ─── Subtasks ───
  /api/tasks/{taskId}/subtasks:
    get:
      tags: [Subtasks]
      summary: List subtasks for a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Array of subtasks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Subtask' }
    post:
      tags: [Subtasks]
      summary: Create a subtask
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
      responses:
        '201':
          description: Created subtask
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Subtask' }

  /api/subtasks/{id}:
    put:
      tags: [Subtasks]
      summary: Update a subtask
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                done: { type: integer, enum: [0, 1] }
      responses:
        '200':
          description: Updated subtask
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Subtask' }
    delete:
      tags: [Subtasks]
      summary: Delete a subtask
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Deletion confirmation
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  /api/subtasks/reorder:
    put:
      tags: [Subtasks]
      summary: Reorder subtasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids: { type: array, items: { type: integer } }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  # ─── Dependencies ───
  /api/tasks/{id}/deps:
    get:
      tags: [Dependencies]
      summary: Get task dependencies
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Array of dependency objects
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: integer }
                    title: { type: string }
                    status: { type: string }
    put:
      tags: [Dependencies]
      summary: Set task dependencies
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [blocked_by]
              properties:
                blocked_by: { type: array, items: { type: integer } }
      responses:
        '200':
          description: Updated dependencies
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  # ─── Comments ───
  /api/tasks/{id}/comments:
    get:
      tags: [Comments]
      summary: List comments on a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Array of comments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Comment' }
    post:
      tags: [Comments]
      summary: Add a comment to a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string }
      responses:
        '201':
          description: Created comment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Comment' }

  /api/tasks/{id}/comments/{commentId}:
    put:
      tags: [Comments]
      summary: Update a comment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: commentId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string }
      responses:
        '200':
          description: Updated comment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Comment' }
    delete:
      tags: [Comments]
      summary: Delete a comment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: commentId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Deletion confirmation
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  # ─── Tags ───
  /api/tags:
    get:
      tags: [Tags]
      summary: List all tags
      responses:
        '200':
          description: Array of tags
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Tag' }
    post:
      tags: [Tags]
      summary: Create a tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                color: { type: string }
      responses:
        '201':
          description: Created tag
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tag' }

  /api/tags/{id}:
    put:
      tags: [Tags]
      summary: Update a tag
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                color: { type: string }
      responses:
        '200':
          description: Updated tag
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tag' }
    delete:
      tags: [Tags]
      summary: Delete a tag
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Deletion confirmation
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  /api/tags/stats:
    get:
      tags: [Tags]
      summary: Get tag usage statistics
      responses:
        '200':
          description: Array of tags with task counts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: integer }
                    name: { type: string }
                    color: { type: string }
                    task_count: { type: integer }

  /api/tasks/{id}/tags:
    put:
      tags: [Tags]
      summary: Set tags on a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tagIds]
              properties:
                tagIds: { type: array, items: { type: integer } }
      responses:
        '200':
          description: Updated tag list for task
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Tag' }

  # ─── Areas ───
  /api/areas:
    get:
      tags: [Areas]
      summary: List all life areas with nested goals
      responses:
        '200':
          description: Array of areas with goals
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Area' }
    post:
      tags: [Areas]
      summary: Create a life area
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                icon: { type: string }
                color: { type: string }
      responses:
        '201':
          description: Created area
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Area' }

  /api/areas/{id}:
    put:
      tags: [Areas]
      summary: Update an area
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                icon: { type: string }
                color: { type: string }
      responses:
        '200':
          description: Updated area
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Area' }
    delete:
      tags: [Areas]
      summary: Delete an area and its goals/tasks
      parameters:
