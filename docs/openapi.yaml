      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [high-priority, due-this-week, no-due-date, completed-today, untagged, blocked]
      responses:
        '200':
          description: Array of matching tasks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Task' }

  /api/filters/counts:
    get:
