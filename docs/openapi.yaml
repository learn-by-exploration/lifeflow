          schema: { type: string }
        - name: priority
          in: query
          schema: { type: integer }
        - name: area_id
          in: query
          schema: { type: integer }
        - name: goal_id
          in: query
          schema: { type: integer }
        - name: tag_id
          in: query
          schema: { type: integer }
        - name: overdue
          in: query
          schema: { type: string, enum: ['true'] }
        - name: has_note
          in: query
          schema: { type: string, enum: ['true'] }
        - name: recurring
          in: query
