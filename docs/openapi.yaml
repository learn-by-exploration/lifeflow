  # ─── Data Management ───
  /api/backup:
    post:
      tags: [Data]
      summary: Trigger a manual backup
      responses:
        '200':
          description: Backup result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  file: { type: string }

  /api/backups:
    get:
      tags: [Data]
      summary: List available backups
      responses:
        '200':
          description: Array of backup files
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name: { type: string }
                    size: { type: integer }
                    date: { type: string }

  /api/export:
    get:
      tags: [Data]
      summary: Export all data as JSON
      responses:
        '200':
          description: Full data export
          content:
            application/json:
              schema:
                type: object
                properties:
                  exportDate: { type: string, format: date-time }
                  areas: { type: array }
                  goals: { type: array }
                  tasks: { type: array }
                  tags: { type: array }

  /api/export/ical:
    get:
      tags: [Data]
      summary: Export tasks as iCal feed
      responses:
        '200':
          description: iCalendar data
          content:
            text/calendar:
              schema:
                type: string

  /api/import:
    post:
      tags: [Data]
      summary: Import data (destructive — requires confirm)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirm, areas, goals, tasks]
              properties:
                confirm: { type: string, enum: [DESTROY_ALL_DATA] }
                areas: { type: array }
                goals: { type: array }
                tasks: { type: array }
                tags: { type: array }
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  imported: { type: object }
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Missing confirmation string
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }

  /api/search:
    get:
      tags: [Data]
      summary: Full-text search across tasks, notes, subtasks
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks: { type: array }
                  notes: { type: array }
                  subtasks: { type: array }

  # ─── Push Notifications ───
  /api/push/vapid-key:
    get:
      tags: [Push Notifications]
      summary: Get VAPID public key for client-side push subscription
      security:
        - cookieAuth: []
      responses:
        '200':
          description: VAPID public key (null if not configured)
          content:
            application/json:
              schema:
                type: object
                properties:
                  publicKey:
                    type: string
                    nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/push/subscribe:
    post:
      tags: [Push Notifications]
      summary: Subscribe to push notifications
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpoint, keys]
              properties:
                endpoint:
                  type: string
                  description: Push subscription endpoint URL
                keys:
                  type: object
                  required: [p256dh, auth]
                  properties:
                    p256dh: { type: string }
                    auth: { type: string }
      responses:
        '201':
          description: Subscription created or updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [Push Notifications]
      summary: Unsubscribe from push notifications
      security:
        - cookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                endpoint:
                  type: string
                  description: Push subscription endpoint URL to remove
      responses:
        '200':
          description: Subscription removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/push/test:
    post:
      tags: [Push Notifications]
      summary: Send a test push notification to all user subscriptions
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Test notification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent: { type: integer }
                  failed: { type: integer }
                  message: { type: string }
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── Health ───
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ok] }
                  version: { type: string }
                  uptime: { type: number }
                  dbOk: { type: boolean }
        '503':
          description: Service unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [error] }
                  version: { type: string }
                  uptime: { type: number }
                  dbOk: { type: boolean }

components:
  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }

  schemas:
    Task:
      type: object
      properties:
        id: { type: integer }
        goal_id: { type: integer }
        title: { type: string }
        note: { type: string, nullable: true }
        status: { type: string, enum: [todo, doing, done] }
        priority: { type: integer, minimum: 0, maximum: 3 }
        position: { type: integer }
        due_date: { type: string, format: date, nullable: true }
        due_time: { type: string, nullable: true }
        recurring: { type: string, nullable: true }
        assigned_to: { type: string, nullable: true }
        my_day: { type: integer, enum: [0, 1] }
        created_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }
        estimated_minutes: { type: number, nullable: true }
        actual_minutes: { type: number, nullable: true }
        time_block_start: { type: string, nullable: true }
        time_block_end: { type: string, nullable: true }
        list_id: { type: integer, nullable: true }
        reminder_at: { type: string, nullable: true }
        tags:
          type: array
          items: { $ref: '#/components/schemas/Tag' }
        subtasks:
          type: array
          items: { $ref: '#/components/schemas/Subtask' }
        blocked_by:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              title: { type: string }
              status: { type: string }

    Subtask:
      type: object
      properties:
        id: { type: integer }
        task_id: { type: integer }
        title: { type: string }
        done: { type: integer, enum: [0, 1] }
        position: { type: integer }

    Tag:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        color: { type: string, nullable: true }

    Area:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        icon: { type: string }
        color: { type: string }
        position: { type: integer }
        goals:
          type: array
          items: { $ref: '#/components/schemas/Goal' }

    Goal:
      type: object
      properties:
        id: { type: integer }
        area_id: { type: integer }
        title: { type: string }
        color: { type: string, nullable: true }
        target_date: { type: string, format: date, nullable: true }
        description: { type: string, nullable: true }
        status: { type: string }
        position: { type: integer }

    Milestone:
      type: object
      properties:
        id: { type: integer }
        goal_id: { type: integer }
        title: { type: string }
        due_date: { type: string, format: date, nullable: true }
        completed: { type: integer, enum: [0, 1] }
        created_at: { type: string, format: date-time }

    List:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        icon: { type: string }
        color: { type: string }
        type: { type: string }
        parent_id: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }
        item_count: { type: integer }
        checked_count: { type: integer }

    ListItem:
      type: object
      properties:
        id: { type: integer }
        list_id: { type: integer }
        text: { type: string }
        checked: { type: integer, enum: [0, 1] }
        category: { type: string, nullable: true }
        quantity: { type: string, nullable: true }
        position: { type: integer }

    Habit:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        icon: { type: string }
        color: { type: string }
        frequency: { type: string }
        target: { type: integer }
        streak: { type: integer }
        created_at: { type: string, format: date-time }
        done_today: { type: integer, enum: [0, 1] }

    FocusSession:
      type: object
      properties:
        id: { type: integer }
        task_id: { type: integer }
        duration_sec: { type: integer }
        type: { type: string }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }

    Note:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        content: { type: string }
        pinned: { type: integer, enum: [0, 1] }
        color: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    InboxItem:
      type: object
      properties:
        id: { type: integer }
        text: { type: string }
        created_at: { type: string, format: date-time }
        processed: { type: integer, enum: [0, 1] }

    Review:
      type: object
      properties:
        id: { type: integer }
        week_start: { type: string, format: date }
        wins: { type: string }
        challenges: { type: string }
        next_week: { type: string }
        rating: { type: integer }
        created_at: { type: string, format: date-time }

    Filter:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        icon: { type: string, nullable: true }
        criteria: { type: object }
        created_at: { type: string, format: date-time }

    Template:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        icon: { type: string }
        tasks: { type: array }
        created_at: { type: string, format: date-time }

    Rule:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        trigger: { type: string }
        action: { type: string }
        config: { type: object }
        enabled: { type: integer, enum: [0, 1] }
        created_at: { type: string, format: date-time }
